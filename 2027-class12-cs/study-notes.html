<!DOCTYPE html>
<html>
<head>
  <title>Study Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body { font-family:'Segoe UI'; margin:0; background:#f1f3f6; transition:0.3s; }

    .dark { background:#121212; color:white; }

    header {
      background: linear-gradient(135deg,#2a5298,#1e3c72);
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container { padding:15px; }

    input {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:none;
      margin-bottom:15px;
    }

    .file {
      background:white;
      margin-bottom:10px;
      padding:12px;
      border-radius:12px;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .dark .file { background:#1e1e1e; }

    .pinned { border-left:5px solid gold; }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .actions i { margin-left:10px; cursor:pointer; }

    .preview {
      width:100%;
      height:400px;
      display:none;
      margin-top:10px;
      border:none;
    }
  </style>
</head>

<body>

<header>
  📘 Study Notes
  <i class="fas fa-moon" onclick="toggleDark()"></i>
</header>

<div class="container">

  <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchFiles()">

  <div id="fileList"></div>

</div>

<script>

// 📌 Load pinned
let pinnedFiles = JSON.parse(localStorage.getItem("pinnedFiles")) || [];

// Load JSON
fetch('notes.json')
.then(res => res.json())
.then(data => {

  let container = document.getElementById("fileList");

  // Sort pinned first
  data.notes.sort((a,b) => pinnedFiles.includes(b.file) - pinnedFiles.includes(a.file));

  data.notes.forEach(note => {

    let div = document.createElement("div");
    div.className = "file";

    if (pinnedFiles.includes(note.file)) {
      div.classList.add("pinned");
    }

    div.innerHTML = `
      <div class="top">
        <span>${note.file.replace(".pdf","")}</span>

        <span class="actions">
          <i class="fas fa-thumbtack" onclick="togglePin('${note.file}')"></i>
          <i class="fas fa-eye" onclick="previewFile('study-notes/${note.file}', this)"></i>
          <a href="study-notes/${note.file}" download>
            <i class="fas fa-download"></i>
          </a>
        </span>
      </div>

      <iframe class="preview"></iframe>
    `;

    container.appendChild(div);
  });

});

// 🔍 Search
function searchFiles() {
  let input = document.getElementById("search").value.toLowerCase();
  let files = document.getElementsByClassName("file");

  for (let i = 0; i < files.length; i++) {
    let text = files[i].innerText.toLowerCase();
    files[i].style.display = text.includes(input) ? "block" : "none";
  }
}

// 📌 Pin toggle
function togglePin(file) {
  let index = pinnedFiles.indexOf(file);

  if (index === -1) {
    pinnedFiles.push(file);
  } else {
    pinnedFiles.splice(index, 1);
  }

  localStorage.setItem("pinnedFiles", JSON.stringify(pinnedFiles));
  location.reload();
}

// 👁 Preview
function previewFile(url, icon) {
  let parent = icon.closest(".file");
  let iframe = parent.querySelector(".preview");

  iframe.src = url;
  iframe.style.display = iframe.style.display === "block" ? "none" : "block";
}

// 🌙 Dark mode
function toggleDark() {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
