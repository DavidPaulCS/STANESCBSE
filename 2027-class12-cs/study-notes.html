<!DOCTYPE html>
<html>
<head>
  <title>Study Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
  font-family: 'Segoe UI';
  margin: 0;
  background: #f1f3f6;
  transition: 0.3s;
}

.dark {
  background: #121212;
  color: white;
}

/* HEADER */
header {
  background: linear-gradient(135deg,#2a5298,#1e3c72);
  color: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
}

/* CONTAINER */
.container {
  padding: 10px;
}

/* SEARCH */
input {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  margin-bottom: 12px;
  font-size: 14px;
}

/* CARD */
.file {
  background: white;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.file:active {
  transform: scale(0.98);
}

.dark .file {
  background: #1e1e1e;
}

/* PIN BORDER */
.pinned {
  border-left: 4px solid gold;
}

/* TOP ROW */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* TITLE */
.title {
  display: flex;
  align-items: center;
  font-size: 14px;
  font-weight: 500;
  flex: 1;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 12px;
  align-items: center;
}

.actions i {
  font-size: 16px;
  cursor: pointer;
}

/* PREVIEW */
.preview {
  width: 100%;
  height: 250px;   /* smaller for mobile */
  display: none;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}
  </style>
</head>

<body>

<header>
  📘 Study Notes
  <i class="fas fa-moon" onclick="toggleDark()"></i>
</header>

<div class="container">

  <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchFiles()">

  <div id="fileList"></div>

</div>

<script>

// 📌 Load pinned
let pinnedFiles = JSON.parse(localStorage.getItem("pinnedFiles")) || [];

// Load JSON
fetch('notes.json')
.then(res => res.json())
.then(data => {

  let container = document.getElementById("fileList");

  // 🔄 Latest first (reverse order)
  data.notes.reverse();

  // 📌 Sort pinned first
  data.notes.sort((a,b) => pinnedFiles.includes(b.file) - pinnedFiles.includes(a.file));

  data.notes.forEach(note => {

    let div = document.createElement("div");
    div.className = "file";

    if (pinnedFiles.includes(note.file)) {
      div.classList.add("pinned");
    }

    let icon = getFileIcon(note.file);
    let cleanName = note.file.replace(/\.[^/.]+$/, "");
    let previewURL = getPreviewURL(note.file);
    let runURL = getRunURL(note.file);

    div.innerHTML = `
      <div class="top">
        <div class="title">
  <span style="margin-right:8px;">${icon}</span>
  ${cleanName}
</div>

        <span class="actions">
          <i class="fas fa-thumbtack" onclick="togglePin('${note.file}')"></i>
          <i class="fas fa-eye" onclick="previewFile('${previewURL}', this)"></i>

          ${runURL ? `<a href="${runURL}" target="_blank"><i class="fas fa-play"></i></a>` : ""}

          <a href="study-notes/${note.file}" download>
            <i class="fas fa-download"></i>
          </a>
        </span>
      </div>

      <iframe class="preview"></iframe>
    `;

    container.appendChild(div);
  });

});

// 📄 File Icons
function getFileIcon(file) {
  if (file.endsWith(".pdf")) return "📄";
  if (file.endsWith(".py")) return "🐍";
  if (file.endsWith(".ipynb")) return "📓";
  if (file.endsWith(".doc") || file.endsWith(".docx")) return "📝";
  return "📁";
}

// ▶️ Run URL (Colab)
function getRunURL(file) {
  if (file.endsWith(".py") || file.endsWith(".ipynb")) {
    return `https://colab.research.google.com/github/DavidPaulCS/STANESCBSE/blob/main/2027-class12-cs/study-notes/${file}`;
  }
  return null;
}

// 👁 Preview URL
function getPreviewURL(file) {

  // 📓 Notebook preview
  if (file.endsWith(".ipynb")) {
    return `https://nbviewer.org/github/DavidPaulCS/STANESCBSE/blob/main/2027-class12-cs/study-notes/${file}`;
  }

  // 🐍 Python preview (raw code)
  if (file.endsWith(".py")) {
    return `https://raw.githubusercontent.com/DavidPaulCS/STANESCBSE/main/2027-class12-cs/study-notes/${file}`;
  }

  // 📄 Default (PDF etc.)
  return "study-notes/" + file;
}

// 🔍 Search
function searchFiles() {
  let input = document.getElementById("search").value.toLowerCase();
  let files = document.getElementsByClassName("file");

  for (let i = 0; i < files.length; i++) {
    let text = files[i].innerText.toLowerCase();
    files[i].style.display = text.includes(input) ? "block" : "none";
  }
}

// 📌 Pin toggle
function togglePin(file) {
  let index = pinnedFiles.indexOf(file);

  if (index === -1) {
    pinnedFiles.push(file);
  } else {
    pinnedFiles.splice(index, 1);
  }

  localStorage.setItem("pinnedFiles", JSON.stringify(pinnedFiles));
  location.reload();
}

// 👁 Preview toggle
function previewFile(url, icon) {
  let parent = icon.closest(".file");
  let iframe = parent.querySelector(".preview");

  iframe.src = url;
  iframe.style.display = iframe.style.display === "block" ? "none" : "block";
}

// 🌙 Dark mode
function toggleDark() {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
