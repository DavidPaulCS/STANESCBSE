<!DOCTYPE html>
<html>
<head>
  <title>Study Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body { font-family:'Segoe UI'; margin:0; background:#f1f3f6; }

    header {
      background: linear-gradient(135deg,#2a5298,#1e3c72);
      color:white;
      padding:15px;
      text-align:center;
    }

    .container { padding:15px; }

    .file {
      background:white;
      margin-bottom:10px;
      padding:12px;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .pinned {
      border-left:5px solid gold;
      background:#fffbe6;
    }

    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .name { font-weight:bold; }

    .actions i {
      margin-left:10px;
      cursor:pointer;
    }

    .preview {
      width:100%;
      height:400px;
      display:none;
      margin-top:10px;
      border:none;
    }
  </style>
</head>

<body>

<header>📘 Study Notes</header>

<div class="container" id="fileList"></div>

<script>
const username = "DavidPaulCS";
const repo = "STANESCBSE";
const folder = "2027-class12-cs/study-notes";

// Load pinned from browser storage
let pinnedFiles = JSON.parse(localStorage.getItem("pinnedFiles")) || [];

fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folder}`)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("fileList");

  // Sort pinned first
  data.sort((a,b) => pinnedFiles.includes(b.name) - pinnedFiles.includes(a.name));

  data.forEach(file => {
    if (file.name.endsWith(".pdf")) {

      let div = document.createElement("div");
      div.className = "file";

      if (pinnedFiles.includes(file.name)) {
        div.classList.add("pinned");
      }

      div.innerHTML = `
        <div class="top">
          <span class="name">${file.name.replace(".pdf","")}</span>

          <span class="actions">
            <i class="fas fa-thumbtack" onclick="togglePin('${file.name}', this)"></i>
            <i class="fas fa-eye" onclick="previewFile('${file.download_url}', this)"></i>
            <a href="${file.download_url}" download>
              <i class="fas fa-download"></i>
            </a>
          </span>
        </div>

        <iframe class="preview"></iframe>
      `;

      container.appendChild(div);
    }
  });
});

// 📌 Toggle pin
function togglePin(filename, icon) {

  let index = pinnedFiles.indexOf(filename);

  if (index === -1) {
    pinnedFiles.push(filename);
  } else {
    pinnedFiles.splice(index, 1);
  }

  localStorage.setItem("pinnedFiles", JSON.stringify(pinnedFiles));

  location.reload(); // refresh to reorder
}

// 👁 Preview
function previewFile(url, icon) {
  let parent = icon.closest(".file");
  let iframe = parent.querySelector(".preview");

  iframe.src = url;
  iframe.style.display = iframe.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
