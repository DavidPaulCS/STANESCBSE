<!DOCTYPE html>
<html>
<head>
  <title>Study Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI';
      margin: 0;
      background: #f1f3f6;
    }

    .dark {
      background: #121212;
      color: white;
    }

    .header {
  position: relative;
  background: linear-gradient(135deg,#2a5298,#1e3c72);
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
}

.header .title {
  display: block;
}

    .container {
      padding: 10px;
      padding-bottom: 70px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .categories button {
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      background: #e0e0e0;
      cursor: pointer;
    }

    .categories .active {
      background: #2a5298;
      color: white;
    }

    .section-title {
      font-size: 14px;
      margin: 10px 5px;
      font-weight: bold;
      color: #555;
    }

    .dark .section-title {
      color: #bbb;
    }

    .file {
      background: white;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .dark .file {
      background: #1e1e1e;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      display: flex;
      align-items: center;
      font-size: 14px;
      font-weight: 500;
      flex: 1;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .actions i {
      cursor: pointer;
    }

    .active-pin {
      color: gold;
    }

    .preview {
      width: 100%;
      height: 250px;
      display: none;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
    }

    .dark .bottom-nav {
      background: #1e1e1e;
    }

    .bottom-nav i {
      font-size: 18px;
    }
  </style>
</head>

<body>

<header class="header">
  <span class="title">📘 Study Notes</span>
</header>

<div class="container">

  <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchFiles()">

  <div class="categories">
    <button onclick="filterCategory('all')" class="active">All</button>
    <button onclick="filterCategory('pdf')">PDFs</button>
    <button onclick="filterCategory('docs')">Docs</button>
    <button onclick="filterCategory('python')">Python Files</button>
  </div>

  <!-- 📌 PINNED SECTION -->
  <div id="pinnedSection"></div>

  <!-- 📄 NORMAL FILES -->
  <div id="fileList"></div>

</div>

<div class="bottom-nav">
  <a href="/STANESCBSE/index.html">
    <i class="fas fa-home"></i>
  </a>
  <div onclick="toggleDark()"><i class="fas fa-moon"></i></div>
</div>

<script>

let allNotes = [];
let currentCategory = "all";
let pinnedFiles = JSON.parse(localStorage.getItem("pinnedFiles")) || [];

fetch('notes.json')
.then(res => res.json())
.then(data => {
  allNotes = data.notes.reverse();
  renderNotes();
});

function renderNotes() {

  let pinnedContainer = document.getElementById("pinnedSection");
  let container = document.getElementById("fileList");

  pinnedContainer.innerHTML = "";
  container.innerHTML = "";

  let notes = allNotes;

  if (currentCategory !== "all") {
    notes = notes.filter(n => n.category === currentCategory);
  }

  let pinned = notes.filter(n => pinnedFiles.includes(n.file));
  let others = notes.filter(n => !pinnedFiles.includes(n.file));

  if (pinned.length > 0) {
    pinnedContainer.innerHTML += `<div class="section-title">📌 Pinned</div>`;
    pinned.forEach(note => pinnedContainer.appendChild(createCard(note)));
  }

  if (others.length > 0) {
    container.innerHTML += `<div class="section-title">All Notes</div>`;
    others.forEach(note => container.appendChild(createCard(note)));
  }
}

function createCard(note) {

  let div = document.createElement("div");
  div.className = "file";

  let icon = getFileIcon(note.file);
  let cleanName = note.file.replace(/\.[^/.]+$/, "");
  let previewURL = getPreviewURL(note.file);

  div.innerHTML = `
    <div class="top">
      <div class="title">
        <span style="margin-right:8px;">${icon}</span>
        ${cleanName}
      </div>

      <div class="actions">

        <i class="fas fa-thumbtack ${pinnedFiles.includes(note.file) ? 'active-pin' : ''}"
           onclick="togglePin('${note.file}')"></i>

        <i class="fas fa-eye" onclick="previewFile('${previewURL}', this)"></i>

        <a href="study-notes/${note.file}" download>
          <i class="fas fa-download"></i>
        </a>

      </div>
    </div>

    <iframe class="preview"></iframe>
  `;

  return div;
}

function togglePin(file) {
  let index = pinnedFiles.indexOf(file);

  if (index === -1) {
    pinnedFiles.push(file);
  } else {
    pinnedFiles.splice(index, 1);
  }

  localStorage.setItem("pinnedFiles", JSON.stringify(pinnedFiles));
  renderNotes();
}

function filterCategory(category) {
  currentCategory = category;

  document.querySelectorAll(".categories button")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  renderNotes();
}

function searchFiles() {
  let input = document.getElementById("search").value.toLowerCase();
  let files = document.getElementsByClassName("file");

  for (let i = 0; i < files.length; i++) {
    let text = files[i].innerText.toLowerCase();
    files[i].style.display = text.includes(input) ? "block" : "none";
  }
}

function previewFile(url, icon) {
  let parent = icon.closest(".file");
  let iframe = parent.querySelector(".preview");

  iframe.src = url;
  iframe.style.display = iframe.style.display === "block" ? "none" : "block";
}

function getFileIcon(file) {
  if (file.endsWith(".pdf")) return "📄";
  if (file.endsWith(".py")) return "🐍";
  if (file.endsWith(".ipynb")) return "📓";
  return "📁";
}

function getPreviewURL(file) {
  if (file.endsWith(".ipynb")) {
    return `https://nbviewer.org/github/DavidPaulCS/STANESCBSE/blob/main/study-notes/${file}`;
  }
  if (file.endsWith(".py")) {
    return `https://raw.githubusercontent.com/DavidPaulCS/STANESCBSE/main/study-notes/${file}`;
  }
  return "study-notes/" + file;
}

function toggleDark() {
  document.body.classList.toggle("dark");
}


</script>

</body>
</html>
