<!DOCTYPE html>
<html>
<head>
  <title>Study Notes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    body { font-family: 'Segoe UI'; margin: 0; background: #f1f3f6; }
    .dark { background: #121212; color: white; }

    .header {
      background: linear-gradient(135deg,#2a5298,#1e3c72);
      color: white;
      padding: 14px;
      text-align: center;
    }

    .container { padding: 10px; padding-bottom: 70px; }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 10px;
    }

    .categories button {
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      background: #e0e0e0;
      cursor: pointer;
    }

    .categories .active {
      background: #2a5298;
      color: white;
    }

    .section-title {
      font-size: 14px;
      margin: 10px 5px;
      font-weight: bold;
      color: #555;
    }

    .file {
      background: white;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.2s;
    }

    .file:active { transform: scale(0.97); }
    .dark .file { background: #1e1e1e; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      display: flex;
      align-items: center;
      font-size: 14px;
      flex: 1;
    }

    .actions { display: flex; gap: 12px; }
    .actions i { cursor: pointer; }
    .active-pin { color: gold; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
    }

    .modal {
      display: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .modal-content {
      position: absolute;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 90%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    iframe { width: 100%; height: 100%; border: none; }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 22px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>

<body>

<header class="header">📘 Study Notes</header>

<div class="container">
  <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchFiles()">

  <div class="categories">
    <button onclick="filterCategory('all')" class="active">All</button>
    <button onclick="filterCategory('pdf')">PDFs</button>
    <button onclick="filterCategory('python')">Python</button>
  </div>

  <div id="pinnedSection"></div>
  <div id="fileList"></div>
</div>

<div class="bottom-nav">
  <a href="/STANESCBSE/index.html"><i class="fas fa-home"></i></a>
  <div onclick="toggleDark()"><i class="fas fa-moon"></i></div>
</div>

<div id="previewModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closePreview()">&times;</span>
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<script>

let allNotes = [];
let pinnedFiles = JSON.parse(localStorage.getItem("pinnedFiles")) || [];
let currentCategory = "all";

fetch('/STANESCBSE/notes.json')
.then(res => res.json())
.then(data => {
  allNotes = data.notes.reverse();
  renderNotes();
});

function renderNotes() {
  let pinnedContainer = document.getElementById("pinnedSection");
  let container = document.getElementById("fileList");

  pinnedContainer.innerHTML = "";
  container.innerHTML = "";

  let notes = allNotes;

  if (currentCategory !== "all") {
    notes = notes.filter(n => n.category === currentCategory);
  }

  let pinned = notes.filter(n => pinnedFiles.includes(n.file));
  let others = notes.filter(n => !pinnedFiles.includes(n.file));

  if (pinned.length) {
    pinnedContainer.innerHTML += `<div class="section-title">📌 Pinned</div>`;
    pinned.forEach(n => pinnedContainer.appendChild(createCard(n)));
  }

  if (others.length) {
    container.innerHTML += `<div class="section-title">All Notes</div>`;
    others.forEach(n => container.appendChild(createCard(n)));
  }
}

function createCard(note) {

  let div = document.createElement("div");
  div.className = "file";

  let cleanName = decodeURIComponent(note.file).replace(/\.[^/.]+$/, "");

  div.onclick = function(e) {
    if (e.target.tagName === "I" || e.target.tagName === "A") return;

    let url = getPreviewURL(note.file);

    if (note.file.endsWith(".ipynb")) {
      window.open(url, "_blank"); // 🔥 permanent fix
    } else {
      openPreview(url);
    }
  };

  div.innerHTML = `
    <div class="top">
      <div class="title">📄 ${cleanName}</div>
      <div class="actions">
        <i class="fas fa-thumbtack ${pinnedFiles.includes(note.file) ? 'active-pin' : ''}"
           onclick="togglePin('${note.file}')"></i>

        <a href="study-notes/${note.file}" download>
          <i class="fas fa-download"></i>
        </a>
      </div>
    </div>
  `;

  return div;
}

function getPreviewURL(file) {
  let encoded = encodeURIComponent(file);

  if (file.endsWith(".ipynb")) {
    return `https://github.com/DavidPaulCS/STANESCBSE/blob/main/2027-class12-cs/study-notes/${encoded}`;
  }

  return `https://docs.google.com/gview?url=https://davidpaulcs.github.io/STANESCBSE/2027-class12-cs/study-notes/${encoded}&embedded=true`;
}

function openPreview(url) {
  document.getElementById("previewFrame").src = url;
  document.getElementById("previewModal").style.display = "block";
}

function closePreview() {
  document.getElementById("previewModal").style.display = "none";
  document.getElementById("previewFrame").src = "";
}

function togglePin(file) {
  let i = pinnedFiles.indexOf(file);
  if (i === -1) pinnedFiles.push(file);
  else pinnedFiles.splice(i, 1);

  localStorage.setItem("pinnedFiles", JSON.stringify(pinnedFiles));
  renderNotes();
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll(".categories button").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderNotes();
}

function searchFiles() {
  let input = document.getElementById("search").value.toLowerCase();
  let files = document.getElementsByClassName("file");

  for (let i = 0; i < files.length; i++) {
    let text = files[i].innerText.toLowerCase();
    files[i].style.display = text.includes(input) ? "block" : "none";
  }
}

function toggleDark() {
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
